<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" role="img" aria-label="Welcome to my profile">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2e97"/>
      <stop offset="0.5" stop-color="#b026ff"/>
      <stop offset="1" stop-color="#00f0ff"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- background + neon frame -->
  <rect x="0" y="0" width="1200" height="240" rx="20" fill="url(#bg)"/>
  <rect x="4" y="4" width="1192" height="232" rx="17" fill="none" stroke="url(#neon)" stroke-width="2" opacity="0.6"/>

  <!-- cyberpunk corner brackets -->
  <path d="M34 30 h66 M34 30 v44" stroke="#ff2e97" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M1166 210 h-66 M1166 210 v-44" stroke="#00f0ff" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- accent dots -->
  <circle cx="120" cy="30" r="4" fill="#00f0ff"/>
  <circle cx="1080" cy="210" r="4" fill="#ff2e97"/>

  <!-- title -->
  <text x="600" y="118" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="60" font-weight="800" fill="#ffffff" letter-spacing="1">Welcome to my profile</text>

  <!-- neon underline -->
  <rect x="350" y="142" width="500" height="6" rx="3" fill="url(#neon)"/>

  <!-- subtitle -->
  <text x="600" y="192" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="24" font-weight="600" fill="#00f0ff" letter-spacing="0.5">Backend Engineer &#160;&#8226;&#160; Mobile Developer &#160;&#8226;&#160; iOS &amp; Android</text>
</svg>
